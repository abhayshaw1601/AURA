<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #1f1f1f;
    }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: #181818; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { color: #e5e5e5; }
    .brand-name { font-size: 14px; font-weight: 600; color: #f5f5f5; }
    .brand-sub  { font-size: 10px; color: #525252; margin-top: 1px; }

    /* Status pill — monochromatic only */
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: #181818; border: 1px solid #2a2a2a;
      color: #a3a3a3;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #525252;
    }
    .status-pill.low  .status-dot { background: #d4d4d4; }
    .status-pill.low  { color: #d4d4d4; }
    .status-pill.med  .status-dot { background: #a3a3a3; }
    .status-pill.high .status-dot { background: #737373; }
    .status-pill.high { color: #737373; }
    .status-pill.scanning .status-dot { background: #404040; animation: blink 1.2s infinite; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    /* ─── Content ─── */
    .content { padding: 14px 16px; }

    /* URL bar */
    .url-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 11px; border-radius: 8px;
      background: #111; border: 1px solid #1f1f1f;
      margin-bottom: 14px;
    }
    .url-bar svg { color: #404040; flex-shrink: 0; }
    .url-text { font-size: 11.5px; color: #737373; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Section label */
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.9px;
      text-transform: uppercase; color: #555555; margin-bottom: 9px;
    }

    /* Summary rows */
    .summary-list { display: flex; flex-direction: column; gap: 2px; }

    .summary-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 12px; border-radius: 8px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .summary-row:hover { background: #111; border-color: #1f1f1f; }

    .row-icon {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 0px;
      color: #525252;
    }
    .row-icon svg { width: 16px; height: 16px; }

    .row-text {
      font-size: 12.5px; line-height: 1.55; color: #c4c4c4;
      font-weight: 400;
    }
    .row-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
      text-transform: uppercase; color: #606060; margin-bottom: 2px;
    }

    /* Divider */
    .divider { height: 1px; background: #1a1a1a; margin: 2px 0; }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -340px 0; }
      100% { background-position: 340px 0; }
    }
    .skeleton-base {
      background: #1a1a1a;
      background-image: linear-gradient(90deg, #1a1a1a 0px, #242424 80px, #1a1a1a 160px);
      background-size: 340px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }
    .skeleton-url   { height: 34px; border-radius: 8px; margin-bottom: 14px; }
    .skeleton-label { height: 10px; width: 90px; border-radius: 4px; margin-bottom: 10px; }
    .skeleton-row   { height: 52px; border-radius: 8px; margin-bottom: 2px; }
    .skeleton-row:last-child { margin-bottom: 0; }

    /* Idle */
    .idle-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 16px; gap: 8px; text-align: center;
    }
    .idle-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: #111; border: 1px solid #1f1f1f;
      display: flex; align-items: center; justify-content: center;
      color: #404040;
    }
    .idle-title { font-size: 12.5px; font-weight: 600; color: #a3a3a3; }
    .idle-sub   { font-size: 11.5px; color: #6b6b6b; line-height: 1.5; max-width: 240px; }

    /* ─── Tab Bar ─── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #1a1a1a;
      padding: 0 16px;
      gap: 2px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #444;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover    { color: #888; }
    .tab-btn.active   { color: #d4d4d4; border-bottom-color: #d4d4d4; }
    .tab-panel        { display: none; }
    .tab-panel.active { display: block; }

    /* ─── Security Tab ─── */
    .cert-card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 10px;
    }
    .cert-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cert-card-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
    }
    .cert-secure-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid #2a2a2a;
      color: #737373;
    }
    .cert-secure-badge.ok  { color: #7fc8a9; border-color: #1e3a30; background: rgba(127,200,169,0.06); }
    .cert-secure-badge.err { color: #b06060; border-color: #3a1e1e; background: rgba(176,96,96,0.06); }

    .cert-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      border-top: 1px solid #181818;
    }
    .cert-row:first-of-type { border-top: none; }
    .cert-key {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #484848;
      min-width: 72px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .cert-val {
      font-size: 11.5px;
      color: #a0a0a0;
      line-height: 1.45;
      word-break: break-all;
    }
    .cert-val.expiry-ok   { color: #7fc8a9; }
    .cert-val.expiry-warn { color: #c8a87f; }
    .cert-val.expiry-err  { color: #b06060; }

    /* Security header pills grid */
    .headers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-bottom: 10px;
    }
    .header-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 7px;
      background: #111;
      border: 1px solid #1c1c1c;
      font-size: 10px;
      font-weight: 500;
      color: #555;
    }
    .header-pill .h-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #2a2a2a;
      flex-shrink: 0;
    }
    .header-pill.ok .h-dot { background: #7fc8a9; }
    .header-pill.ok        { color: #7a9e8e; }
    .header-pill.fail .h-dot { background: #8a4040; }
    .header-pill.fail      { color: #6a4040; }

    /* Issues list */
    .issues-list { display: flex; flex-direction: column; gap: 4px; }
    .issue-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 7px;
      background: #0f0d0d;
      border: 1px solid #261a1a;
    }
    .issue-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #7a3a3a;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .issue-text {
      font-size: 11px;
      color: #8a6060;
      line-height: 1.45;
    }
    .no-issues {
      font-size: 11.5px;
      color: #4a7a62;
      padding: 10px 0;
      text-align: center;
    }

    /* Protocol badge */
    .protocol-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      background: #141414;
      border: 1px solid #202020;
      font-size: 10px;
      font-weight: 600;
      color: #606060;
      letter-spacing: 0.4px;
    }

    /* Threat Shield */
    .threat-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #111;
      border: 1px solid #1f1f1f;
      margin-bottom: 15px;
    }
    .threat-banner.safe { border-color: #1e3a30; background: rgba(127,200,169,0.04); }
    .threat-banner.warn { border-color: #3a1e1e; background: rgba(176,96,96,0.06); }
    .threat-banner-icon { flex-shrink: 0; display: flex; }
    .threat-banner-text { flex-grow: 1; }
    .threat-title { font-size: 11px; font-weight: 600; color: #d4d4d4; margin-bottom: 2px; }
    .threat-desc { font-size: 10.5px; color: #888; line-height: 1.4; }
    .threat-banner.safe .threat-title { color: #7fc8a9; }
    .threat-banner.warn .threat-title { color: #b06060; }

    /* AI Inference Banner */
    .ai-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #111;
      border: 1px solid #1f1f1f;
      margin-bottom: 15px;
    }
    .ai-banner.safe { border-color: #2e1a4a; background: rgba(168, 85, 247, 0.04); }
    .ai-banner.warn { border-color: #4a1a3a; background: rgba(216, 180, 254, 0.06); }
    .ai-banner.warn .threat-title { color: #d8b4fe; }
    .ai-banner.safe .threat-title { color: #a855f7; }

    /* Security scanning skeleton */
    .sec-skeleton { display: flex; flex-direction: column; gap: 6px; }
    .sec-skeleton-row { height: 36px; border-radius: 8px; }

    /* Footer */
    .footer {
      padding: 8px 16px; border-top: 1px solid #141414;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .footer-text { font-size: 10px; color: #4b4b4b; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <!-- Lucide: shield -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Aura</div>
        <div class="brand-sub">Ambient Security Layer</div>
      </div>
    </div>
    <div id="status-pill" class="status-pill scanning">
      <div class="status-dot"></div>
      <span id="status-text">Scanning</span>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-privacy">Privacy</button>
    <button class="tab-btn"        id="tab-security">Security</button>
  </div>

  <!-- Privacy Tab Panel -->
  <div id="panel-privacy" class="tab-panel active">
    <div id="main-content" class="content">
      <div class="skeleton-base skeleton-url"></div>
      <div class="skeleton-base skeleton-label"></div>
      <div class="skeleton-base skeleton-row"></div>
      <div class="skeleton-base skeleton-row"></div>
      <div class="skeleton-base skeleton-row"></div>
    </div>
  </div>

  <!-- Security Tab Panel -->
  <div id="panel-security" class="tab-panel">
    <div id="security-content" class="content">
      <div class="sec-skeleton">
        <div class="skeleton-base sec-skeleton-row"></div>
        <div class="skeleton-base sec-skeleton-row"></div>
        <div class="skeleton-base sec-skeleton-row"></div>
        <div class="skeleton-base sec-skeleton-row"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#333333" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
    <span class="footer-text">Gemini 2.5 Flash Lite</span>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#333333" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
  </div>

  <script src="popup.js"></script>
</body>
</html>
