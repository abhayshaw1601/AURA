<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="brand-name">Aura</h1>
      <div id="status-badge" class="status-badge">
        <div class="status-dot"></div>
        <span id="status-text">Inactive</span>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Default Idle State (Natural/Hand-drawn) -->
      <div class="empty-state">
        <div class="hand-drawn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h2 class="empty-title">Resting</h2>
        <p class="empty-sub">Navigate to a policy page to begin your privacy journey.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-dot"></div>
      <span class="footer-text">Gemini 2.5 Flash Lite</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
