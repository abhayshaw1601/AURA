<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aura</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: 'Inter', sans-serif;
      background: #F4F1DE;
      color: #3D405B;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: #FFFFFF;
      box-shadow: 0 4px 12px rgba(61, 64, 91, 0.06);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { color: #E07A5F; width: 18px; height: 18px; }
    
    .brand-name { font-size: 16px; font-weight: 700; color: #3D405B; letter-spacing: -0.3px; }
    .brand-sub  { font-size: 11px; color: #AB5C48; font-weight: 500; margin-top: 2px; }

    /* Status pill */
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      background: #FFFFFF;
      box-shadow: 0 2px 8px rgba(61, 64, 91, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #3D405B;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3D405B;
    }
    .status-pill.low  .status-dot { background: #81B29A; box-shadow: 0 0 8px rgba(129, 178, 154, 0.6); }
    .status-pill.low  { color: #81B29A; }
    
    .status-pill.med  .status-dot { background: #E07A5F; box-shadow: 0 0 8px rgba(224, 122, 95, 0.6); }
    .status-pill.med  { color: #E07A5F; }
    
    .status-pill.high .status-dot { background: #AB5C48; box-shadow: 0 0 8px rgba(171, 92, 72, 0.6); }
    .status-pill.high { color: #AB5C48; }
    
    .status-pill.scanning .status-dot { animation: blink 1.2s infinite; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ─── Content ─── */
    .content { padding: 20px; }

    /* URL bar */
    .url-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 12px;
      background: #FFFFFF;
      box-shadow: 0 4px 14px rgba(61, 64, 91, 0.04);
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .url-bar svg { color: #81B29A; flex-shrink: 0; width: 16px; height: 16px; }
    .url-text { font-size: 12px; font-weight: 500; color: #3D405B; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Section label */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #AB5C48; margin-bottom: 12px;
      padding-left: 4px;
    }

    /* Summary rows */
    .summary-list { 
      display: flex; flex-direction: column; 
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(61, 64, 91, 0.05);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .summary-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px;
      background: transparent;
      transition: background 0.2s;
    }
    .summary-row:hover { background: #faf9f2; }

    .row-icon {
      width: 32px; height: 32px; flex-shrink: 0; 
      background: #F4F1DE; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #E07A5F;
    }
    .row-icon svg { width: 16px; height: 16px; }

    .row-text {
      font-size: 13px; line-height: 1.5; color: #3D405B;
      font-weight: 500;
    }
    .row-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: #AB5C48; margin-bottom: 4px;
    }

    /* Divider */
    .divider { height: 1px; background: rgba(61, 64, 91, 0.06); margin: 0 16px; }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -360px 0; }
      100% { background-position: 360px 0; }
    }
    .skeleton-base {
      background: rgba(255, 255, 255, 0.4);
      background-image: linear-gradient(90deg, rgba(255,255,255,0) 0px, #FFFFFF 80px, rgba(255,255,255,0) 160px);
      background-size: 360px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }
    .skeleton-url   { height: 42px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 4px 14px rgba(61,64,91,0.02); background-color:#fff;}
    .skeleton-label { height: 12px; width: 110px; border-radius: 4px; margin-bottom: 12px; margin-left: 4px;}
    .skeleton-row   { height: 160px; border-radius: 16px; margin-bottom: 0; box-shadow: 0 4px 20px rgba(61,64,91,0.03); background-color:#fff;}

    /* Idle */
    .idle-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; text-align: center;
    }
    .idle-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: #FFFFFF; 
      box-shadow: 0 8px 24px rgba(61, 64, 91, 0.08);
      display: flex; align-items: center; justify-content: center;
      color: #81B29A;
      margin-bottom: 20px;
    }
    .idle-icon svg { width: 28px; height: 28px; }
    .idle-title { font-size: 15px; font-weight: 700; color: #3D405B; margin-bottom: 8px; }
    .idle-sub   { font-size: 13px; color: #AB5C48; line-height: 1.5; font-weight: 500; max-width: 260px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <!-- Lucide: shield -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Aura</div>
        <div class="brand-sub">Ambient Security Layer</div>
      </div>
    </div>
    <div id="status-pill" class="status-pill scanning">
      <div class="status-dot"></div>
      <span id="status-text">Scanning</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main-content" class="content">
    <div class="skeleton-base skeleton-url"></div>
    <div class="skeleton-base skeleton-label"></div>
    <div class="skeleton-base skeleton-row"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
