<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aura</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'Inter', sans-serif;
      background: #f5f5dc;
      color: #111827;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: transparent; border: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { color: #374151; }
    .brand-name { font-size: 14px; font-weight: 600; color: #111827; }
    .brand-sub  { font-size: 10px; color: #6b7280; margin-top: 1px; }

    /* Status pill — monochromatic only */
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: transparent; border: 1px solid #e5e7eb;
      color: #4b5563;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #9ca3af;
    }
    .status-pill.low  .status-dot { background: #10b981; }
    .status-pill.low  { color: #059669; background: #d1fae5; border-color: #a7f3d0; }
    .status-pill.med  .status-dot { background: #f59e0b; }
    .status-pill.high .status-dot { background: #ef4444; }
    .status-pill.high { color: #b91c1c; background: #fee2e2; border-color: #fecaca; }
    .status-pill.scanning .status-dot { background: #404040; animation: blink 1.2s infinite; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    /* ─── Content ─── */
    .content { padding: 14px 16px; }

    /* URL bar */
    .url-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 11px; border-radius: 8px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      margin-bottom: 14px;
    }
    .url-bar svg { color: #9ca3af; flex-shrink: 0; }
    .url-text { font-size: 11.5px; color: #4b5563; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Section label */
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.9px;
      text-transform: uppercase; color: #6b7280; margin-bottom: 9px;
    }

    /* Summary rows */
    .summary-list { display: flex; flex-direction: column; gap: 2px; }

    .summary-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 12px; border-radius: 8px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .summary-row:hover { background: #f9fafb; border-color: #e5e7eb; }

    .row-icon {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 0px;
      color: #6b7280;
    }
    .row-icon svg { width: 16px; height: 16px; }

    .row-text {
      font-size: 12.5px; line-height: 1.55; color: #374151;
      font-weight: 400;
    }
    .row-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
      text-transform: uppercase; color: #6b7280; margin-bottom: 2px;
    }

    /* Divider */
    .divider { height: 1px; background: #e5e7eb; margin: 2px 0; }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -340px 0; }
      100% { background-position: 340px 0; }
    }
    .skeleton-base {
      background: #f3f4f6;
      background-image: linear-gradient(90deg, #f3f4f6 0px, #ffffff 80px, #f3f4f6 160px);
      background-size: 340px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }
    .skeleton-url   { height: 34px; border-radius: 8px; margin-bottom: 14px; }
    .skeleton-label { height: 10px; width: 90px; border-radius: 4px; margin-bottom: 10px; }
    .skeleton-row   { height: 52px; border-radius: 8px; margin-bottom: 2px; }
    .skeleton-row:last-child { margin-bottom: 0; }

    /* Idle */
    .idle-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 16px; gap: 8px; text-align: center;
    }
    .idle-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: transparent; border: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: center;
      color: #6b7280;
    }
    .idle-title { font-size: 12.5px; font-weight: 600; color: #111827; }
    .idle-sub   { font-size: 11.5px; color: #6b7280; line-height: 1.5; max-width: 240px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <!-- Lucide: shield -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Aura</div>
        <div class="brand-sub">Ambient Security Layer</div>
      </div>
    </div>
    <div id="status-pill" class="status-pill scanning">
      <div class="status-dot"></div>
      <span id="status-text">Scanning</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main-content" class="content">
    <div class="skeleton-base skeleton-url"></div>
    <div class="skeleton-base skeleton-label"></div>
    <div class="skeleton-base skeleton-row"></div>
    <div class="skeleton-base skeleton-row"></div>
    <div class="skeleton-base skeleton-row"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
